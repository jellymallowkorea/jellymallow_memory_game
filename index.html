<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jelly Mallow 같은 그림 맞추기</title>
<style>
  :root{
    --cream:#FFF8EC;
    --ink:#26241F;
    --blue:#2451A6;
    --red:#E14B3C;
    --yellow:#F4B93E;
    --pink:#F2A0AE;
    --green:#9CBF6B;
    --card-back:#FFE0E4;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  html, body{height:100%;}
  body{
    margin:0;
    font-family:'Trebuchet MS','Apple SD Gothic Neo','Segoe UI',sans-serif;
    background:#E4DED0;
    color:var(--ink);
    height:100vh;
    height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    padding:0;
  }
  .phone{
    position:relative;
    width:100%;
    max-width:430px;
    height:100vh;
    height:100dvh;
    max-height:900px;
    background:
      radial-gradient(circle at 15% 20%, rgba(244,185,62,0.18), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(36,81,166,0.15), transparent 45%),
      var(--cream);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:16px 14px 12px;
    overflow:hidden;
  }
  @media (min-width:460px) and (min-height:760px){
    body{padding:24px;}
    .phone{
      height:min(100dvh - 48px, 860px);
      height:min(calc(100vh - 48px), 860px);
      border-radius:36px;
      border:3px solid var(--ink);
      box-shadow:10px 10px 0 rgba(38,36,31,0.18);
    }
  }
  .brandbar{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:2px;
  }
  .brandbar .logo{
    background:var(--ink);
    color:#fff;
    font-weight:800;
    font-size:9px;
    letter-spacing:0.5px;
    padding:3px 6px;
    border-radius:4px;
    line-height:1.1;
    text-align:left;
  }
  .brandbar .logo span{display:block;}
  .brandbar .logo .dot-j{color:var(--yellow);}
  .brandbar .logo .dot-m{color:var(--red);}
  h1{
    font-size:20px;
    margin:2px 0 1px;
    text-align:center;
    letter-spacing:-0.3px;
  }
  .sub{
    color:#6b6659;
    font-size:11px;
    margin-bottom:10px;
    text-align:center;
  }
  .hud{
    display:flex;
    gap:8px;
    margin-bottom:10px;
    flex-wrap:wrap;
    justify-content:center;
    width:100%;
  }
  .pill{
    background:#fff;
    border:1.5px solid var(--ink);
    border-radius:999px;
    padding:5px 10px;
    font-weight:700;
    font-size:11px;
    display:flex;
    align-items:center;
    gap:4px;
    box-shadow:2px 2px 0 var(--ink);
    justify-content:center;
  }
  .pill.timer{border-color:var(--red);color:var(--red);}
  .pill.timer.warn{
    animation:pulse 0.6s infinite;
  }
  .pill.score{border-color:var(--blue);color:var(--blue);}
  .pill.pairs{border-color:var(--green);color:#4c6b2d;}
  @keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
  }
  .combo-toast{
    position:absolute;
    top:16%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.6);
    background:var(--yellow);
    border:3px solid var(--ink);
    border-radius:14px;
    padding:8px 18px;
    font-weight:800;
    font-size:16px;
    color:var(--ink);
    box-shadow:4px 4px 0 var(--ink);
    z-index:60;
    opacity:0;
    pointer-events:none;
    white-space:nowrap;
  }
  .combo-toast.show{
    animation:comboPop 0.9s ease forwards;
  }
  @keyframes comboPop{
    0%{opacity:0; transform:translate(-50%,-50%) scale(0.5) rotate(-4deg);}
    15%{opacity:1; transform:translate(-50%,-50%) scale(1.15) rotate(2deg);}
    30%{transform:translate(-50%,-50%) scale(1) rotate(0deg);}
    75%{opacity:1; transform:translate(-50%,-55%) scale(1) rotate(0deg);}
    100%{opacity:0; transform:translate(-50%,-70%) scale(0.9) rotate(0deg);}
  }
  .board{
    flex:1 1 auto;
    min-height:0;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(6,1fr);
    gap:7px;
    width:100%;
  }
  .card{
    perspective:800px;
    cursor:pointer;
    width:100%;
    height:100%;
  }
  .card-inner{
    position:relative;
    width:100%;
    height:100%;
    transition:transform 0.45s cubic-bezier(.4,.2,.2,1);
    transform-style:preserve-3d;
  }
  .card.flipped .card-inner,
  .card.matched .card-inner{
    transform:rotateY(180deg);
  }
  .card-face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius:var(--radius);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    border:2px solid var(--ink);
  }
  .card-back{
    background:var(--card-back);
    box-shadow:2px 2px 0 var(--ink);
    padding:16%;
  }
  .card-back img{
    width:100%;
    height:auto;
    object-fit:contain;
  }
  .card-front{
    background:#fff;
    transform:rotateY(180deg);
    padding:6px;
  }
  .card-front img{
    width:100%;
    height:100%;
    object-fit:contain;
  }
  .card.matched .card-face.card-front{
    background:#F1F9E8;
    box-shadow:0 0 0 3px var(--green) inset;
  }
  .card.matched .card-face.card-front::after{
    content:"✅";
    position:absolute;
    top:6px;
    right:8px;
    font-size:18px;
  }
  .card.wrong .card-face.card-front{
    background:#FDECEA;
    box-shadow:0 0 0 3px var(--red) inset;
  }
  .card.wrong .card-face.card-front::after{
    content:"❌";
    position:absolute;
    top:6px;
    right:8px;
    font-size:18px;
  }
  .card:not(.flipped):not(.matched):hover .card-inner{
    transform:translateY(-3px) rotateY(0deg);
  }
  .card.matched{cursor:default;}
  .card.shake .card-inner{
    animation:shake 0.4s;
  }
  @keyframes shake{
    0%,100%{transform:rotateY(180deg) translateX(0);}
    25%{transform:rotateY(180deg) translateX(-6px);}
    75%{transform:rotateY(180deg) translateX(6px);}
  }
  .overlay{
    position:absolute;
    inset:0;
    background:rgba(38,36,31,0.72);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:16px;
    border-radius:inherit;
  }
  .overlay.hidden{display:none;}
  .modal{
    background:var(--cream);
    border:3px solid var(--ink);
    border-radius:22px;
    padding:26px 22px;
    max-width:340px;
    width:100%;
    max-height:88vh;
    max-height:88dvh;
    overflow-y:auto;
    text-align:center;
    box-shadow:8px 8px 0 var(--ink);
  }
  .modal h2{
    margin:0 0 8px;
    font-size:26px;
  }
  .modal p{
    color:#6b6659;
    font-size:14px;
    margin:0 0 18px;
    line-height:1.5;
  }
  .modal .big-score{
    font-size:44px;
    font-weight:800;
    color:var(--blue);
    margin:10px 0 4px;
    line-height:1.1;
    white-space:nowrap;
  }
  .modal .final-detail{
    font-size:14px;
    color:var(--ink);
    font-weight:600;
    margin:0 0 20px;
  }
  button.action{
    background:var(--ink);
    color:#fff;
    border:none;
    border-radius:999px;
    padding:12px 28px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    box-shadow:3px 3px 0 var(--red);
    transition:transform 0.15s;
  }
  button.action:hover{transform:translateY(-2px);}
  button.action:active{transform:translateY(1px);box-shadow:2px 2px 0 var(--red);}
  .startface{
    font-size:52px;
    margin-bottom:6px;
  }
  .flavor{
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--red);
    font-weight:800;
    margin-bottom:6px;
  }
</style>
</head>
<body>
<div class="phone">

  <div class="brandbar">
    <div class="logo">
      <span class="dot-j">J</span><span style="margin-top:-4px">ELLY</span>
      <span class="dot-m" style="margin-top:2px">M</span><span style="margin-top:-4px">ALLOW</span>
    </div>
  </div>
  <h1>같은 그림 맞추기</h1>
  <div class="sub">같은 그림 카드를 모두 찾아보세요 · 한 쌍당 5점</div>

  <div class="hud">
    <div class="pill timer" id="timerPill">⏱️ <span id="timeLeft">0</span>초</div>
    <div class="pill score">⭐ <span id="score">0</span>점</div>
    <div class="pill pairs">🧩 <span id="pairsFound">0</span>/9</div>
  </div>

  <div class="board" id="board"></div>
  <div class="combo-toast" id="comboToast">🔥 콤보! +3</div>

  <div class="overlay" id="startOverlay">
    <div class="modal">
      <div class="startface">🧦👖</div>
      <div class="flavor">Jelly Mallow Memory</div>
      <h2>같은 그림 맞추기</h2>
      <p>같은 제품 카드 두 장을 찾아 짝지어보세요.<br>짝을 맞출 때마다 5점, 1초 안에 빠르게 맞추면 콤보 보너스 +3점!<br>모두 맞추면 걸린 시간이 표시돼요.</p>
      <button class="action" id="startBtn">게임 시작</button>
    </div>
  </div>

  <div class="overlay hidden" id="endOverlay">
    <div class="modal">
      <div class="startface" id="endEmoji">🏆</div>
      <h2 id="endTitle">완성! 모든 짝을 찾았어요</h2>
      <div class="big-score"><span id="finalScore">0</span>점</div>
      <div class="final-detail" id="finalDetail">걸린 시간 0초</div>
      <button class="action" id="restartBtn">다시 하기</button>
    </div>
  </div>

</div>

const ids = Object.keys(IMAGES); // 9 unique product images
let deck = [];
let firstCard = null;
let secondCard = null;
let lockBoard = false;
let score = 0;
let pairsFound = 0;
let elapsedTime = 0;
let timerInterval = null;
let gameActive = false;
let firstFlipTime = 0;
let comboCount = 0;
const COMBO_WINDOW_MS = 1000;
const COMBO_BONUS = 3;

const boardEl = document.getElementById('board');
const scoreEl = document.getElementById('score');
const pairsEl = document.getElementById('pairsFound');
const timeEl = document.getElementById('timeLeft');
const timerPill = document.getElementById('timerPill');
const startOverlay = document.getElementById('startOverlay');
const endOverlay = document.getElementById('endOverlay');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const finalScore = document.getElementById('finalScore');
const finalDetail = document.getElementById('finalDetail');
const endTitle = document.getElementById('endTitle');
const endEmoji = document.getElementById('endEmoji');
const comboToast = document.getElementById('comboToast');

function shuffle(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildDeck(){
  let pairs = [];
  ids.forEach(id => {
    pairs.push({id, uid: id + '-a'});
    pairs.push({id, uid: id + '-b'});
  });
  return shuffle(pairs);
}

function renderBoard(){
  boardEl.innerHTML = '';
  deck.forEach(cardData => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = cardData.id;
    card.dataset.uid = cardData.uid;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back"><img src="${LOGO}" alt="Jelly Mallow"></div>
        <div class="card-face card-front"><img src="${IMAGES[cardData.id]}" alt="product"></div>
      </div>
    `;
    card.addEventListener('click', () => onCardClick(card));
    boardEl.appendChild(card);
  });
}

function onCardClick(card){
  if(!gameActive || lockBoard) return;
  if(card.classList.contains('flipped') || card.classList.contains('matched')) return;

  card.classList.add('flipped');

  if(!firstCard){
    firstCard = card;
    firstFlipTime = Date.now();
    return;
  }
  secondCard = card;
  lockBoard = true;
  checkMatch();
}

function checkMatch(){
  const isMatch = firstCard.dataset.id === secondCard.dataset.id;
  if(isMatch){
    firstCard.classList.add('matched');
    secondCard.classList.add('matched');

    const reactionTime = Date.now() - firstFlipTime;
    const isCombo = reactionTime <= COMBO_WINDOW_MS;

    if(isCombo){
      comboCount += 1;
      score += 5 + COMBO_BONUS;
      showComboToast();
    } else {
      comboCount = 0;
      score += 5;
    }

    pairsFound += 1;
    scoreEl.textContent = score;
    pairsEl.textContent = pairsFound;
    resetTurn();
    if(pairsFound === ids.length){
      endGame();
    }
  } else {
    comboCount = 0;
    firstCard.classList.add('shake','wrong');
    secondCard.classList.add('shake','wrong');
    setTimeout(() => {
      firstCard.classList.remove('flipped','shake','wrong');
      secondCard.classList.remove('flipped','shake','wrong');
      resetTurn();
    }, 700);
  }
}

function showComboToast(){
  const label = comboCount > 1 ? `🔥 ${comboCount}콤보! +${COMBO_BONUS}` : `🔥 콤보! +${COMBO_BONUS}`;
  comboToast.textContent = label;
  comboToast.classList.remove('show');
  // force reflow so the animation can restart on rapid combos
  void comboToast.offsetWidth;
  comboToast.classList.add('show');
}

function resetTurn(){
  [firstCard, secondCard] = [null, null];
  lockBoard = false;
}

function startTimer(){
  timerInterval = setInterval(() => {
    elapsedTime += 1;
    timeEl.textContent = elapsedTime;
  }, 1000);
}

function endGame(){
  gameActive = false;
  clearInterval(timerInterval);
  finalScore.textContent = score;
  finalDetail.textContent = `걸린 시간 ${elapsedTime}초`;
  endEmoji.textContent = '🏆';
  endTitle.textContent = '완성! 모든 짝을 찾았어요';
  endOverlay.classList.remove('hidden');
}

function resetGame(){
  score = 0;
  pairsFound = 0;
  elapsedTime = 0;
  comboCount = 0;
  scoreEl.textContent = 0;
  pairsEl.textContent = 0;
  timeEl.textContent = 0;
  firstCard = null;
  secondCard = null;
  lockBoard = false;
  clearInterval(timerInterval);
  comboToast.classList.remove('show');
  deck = buildDeck();
  renderBoard();
}

function startGame(){
  resetGame();
  gameActive = true;
  startOverlay.classList.add('hidden');
  endOverlay.classList.add('hidden');
  startTimer();
}

startBtn.addEventListener('click', startGame);
restartBtn.addEventListener('click', startGame);

// initial render (face down, non-interactive until start)
deck = buildDeck();
renderBoard();
</script>
